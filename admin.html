<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Undangan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f6f7fb;
padding:40px;
color:#1f2937;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:26px;
font-weight:600;
}

.badge{
background:#e5edff;
color:#2f5aff;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
margin-bottom:25px;
}

/* TEXTAREA */

textarea{
width:100%;
height:170px;
border:1px solid #e5e7eb;
border-radius:10px;
padding:15px;
font-size:15px;
resize:none;
outline:none;
transition:.2s;
}

textarea:focus{
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.1);
}

/* BUTTON */

button{
margin-top:15px;
padding:12px 22px;
background:#6366f1;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#4f46e5;
}

/* RESULTS */

.results{
margin-top:25px;
}

.result-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-radius:10px;
border:1px solid #f0f0f0;
margin-bottom:10px;
background:white;
transition:.2s;
}

.result-item:hover{
box-shadow:0 4px 15px rgba(0,0,0,0.06);
transform:translateY(-2px);
}

.result-text{
max-width:70%;
}

.result-text strong{
font-size:15px;
display:block;
margin-bottom:3px;
}

.result-text p{
font-size:12px;
color:#6b7280;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

/* COPY BUTTON */

.copy-btn{
background:#eef2ff;
color:#4f46e5;
border:none;
padding:7px 14px;
border-radius:6px;
font-size:12px;
font-weight:500;
cursor:pointer;
}

.copy-btn:hover{
background:#e0e7ff;
}

.copy-btn.success{
background:#10b981;
color:white;
}

</style>
</head>

<body>

<div class="header">
<h1>Input Tamu</h1>
<span class="badge">Admin</span>
</div>


<div class="card">

<textarea id="guestListInput" placeholder="Masukkan nama tamu (1 baris = 1 tamu)

Contoh:
Bapak Ahmad & Keluarga
Muzanni
Fulan bin Fulan"></textarea>

<button id="generateButton">Generate Link Undangan</button>

<div class="results" id="resultsList"></div>

</div>


<script>

const LINK_DASAR="https://musab-atin.vercel.app/";

const NAMA_PRIA="Mus'ab Umair";
const NAMA_WANITA="Rahma Zuhriatin";

const generateButton=document.getElementById("generateButton");
const guestListInput=document.getElementById("guestListInput");
const resultsList=document.getElementById("resultsList");


function generateLinks(){

const rawText=guestListInput.value.trim();

if(!rawText){
alert("Masukkan nama tamu terlebih dahulu");
return;
}

const names=rawText.split('\n').map(n=>n.trim()).filter(n=>n!="");

resultsList.innerHTML="";

names.forEach(name=>{

const encodedName=encodeURIComponent(name);

const fullLink=`${LINK_DASAR}?to=${encodedName}`;

const waMessage=`*Assalamu'alaikum Warahmatullah Wabarakatuh*

Yth. *${name}*
(Mohon maaf bila ada kekeliruan penulisan nama/gelar)

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri acara pernikahan kami:

*${NAMA_PRIA}* & *${NAMA_WANITA}*

Detail informasi mengenai acara dapat diakses melalui link undangan digital berikut:

${fullLink}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir dan memberikan doa restu.

*Wassalamu'alaikum Warahmatullahi Wabarakatuh*`;

const item=document.createElement("div");
item.className="result-item";

const text=document.createElement("div");
text.className="result-text";

text.innerHTML=`<strong>${name}</strong><p>${fullLink}</p>`;

const btn=document.createElement("button");
btn.className="copy-btn";
btn.textContent="Salin Pesan";

btn.onclick=function(){

navigator.clipboard.writeText(waMessage);

btn.textContent="Tersalin!";
btn.classList.add("success");

setTimeout(()=>{
btn.textContent="Salin Pesan";
btn.classList.remove("success");
},2000);

};

item.appendChild(text);
item.appendChild(btn);

resultsList.appendChild(item);

});

}

generateButton.addEventListener("click",generateLinks);

</script>

</body>
</html>
